# Cloudflare Email Worker for duitku.
#
# Triggered by Cloudflare Email Routing for messages sent to
# `insert@quanianitis.com`. Strips attachments, classifies the bank,
# POSTs each attachment to the duitku webhook over HTTPS with an
# X-API-Key header.
#
# Deploy:
#   wrangler deploy
#
# Secrets (set out of band with `wrangler secret put`):
#   GATEWAY_API_KEY  - matches Secret/gateway-api-key key `cf-worker`
#                      in the duitku namespace. See
#                      ~/Documents/homelab/infra/charts/duitku/api-key-secret.yaml
#
# The Email Routing rule itself (insert@quanianitis.com -> this Worker)
# is configured in the Cloudflare dashboard, not here. wrangler does
# not yet manage routing rules declaratively.

name = "duitku-email-worker"
main = "src/index.ts"
compatibility_date = "2026-01-15"
compatibility_flags = ["nodejs_compat"]

# Workers free tier is fine for our volume (~tens of emails/month).
# Bumping to bundled would only matter if statement parsing happened
# here (it doesn't).
workers_dev = false

[vars]
# Public, non-secret config. The webhook URL is fixed for the homelab
# and changing it is a coordinated DNS/Gateway/Worker change anyway.
WEBHOOK_URL = "https://duitku-inbox.62a.quanianitis.com/cf-inbox"

# Comma-separated SMTP envelope-from addresses or sender domains
# allowed to invoke the pipeline. Defence in depth on top of the
# Cloudflare dashboard's address-rules allowlist. Domain match is
# suffix-based (lowercased), exact-match wins.
#
# Edit and `wrangler deploy` to add a new bank or a new forwarding
# address.
SENDER_ALLOWLIST = "maybank2u.com.my,maybank.com.my,uob.com.my,uob.com.sg,ryt.com.my,rytbank.com.my,quanianitis@gmail.com,work@quanianitis.com,main@quanianitis.com"

# Max single attachment size in bytes (25 MiB; matches Gmail's
# outbound cap and the receiver's hard limit).
MAX_ATTACHMENT_BYTES = "26214400"
