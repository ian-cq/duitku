# release.yaml — build & push duitku image to GHCR.
#
# Invoked via `workflow_call` from build.yaml after tests pass, and
# also runnable on its own via `workflow_dispatch` (e.g. when a base
# image CVE needs a rebuild without a code change).
#
# Pushes to ghcr.io/<owner>/duitku with the following tag scheme:
#
#   pushed from main:
#     ghcr.io/<owner>/duitku:<version-from-pyproject>
#     ghcr.io/<owner>/duitku:main
#     ghcr.io/<owner>/duitku:sha-<short-sha>
#
#   pushed from tag vX.Y.Z (and version matches):
#     ghcr.io/<owner>/duitku:<vX.Y.Z>
#     ghcr.io/<owner>/duitku:vX.Y
#     ghcr.io/<owner>/duitku:vX
#     ghcr.io/<owner>/duitku:latest
#     ghcr.io/<owner>/duitku:sha-<short-sha>
#
# Authentication uses the workflow-issued GITHUB_TOKEN with
# `packages: write`; no PAT is required. The first publish creates the
# package under the repo; visibility (private/public) is then managed
# via the GitHub UI (Settings -> Packages).
#
# The image is amd64-only on purpose: the homelab k3s cluster is a
# single amd64 node and cross-building arm64 doubles CI time for zero
# operational benefit. Add an arm64 build here if/when a second node
# joins.

name: release

on:
  workflow_call:
    inputs:
      ref:
        description: "git ref to build (default: caller's ref)"
        type: string
        required: false
        default: ''
  workflow_dispatch:
    inputs:
      ref:
        description: "git ref to build (branch, tag, or sha)"
        type: string
        required: false
        default: ''

jobs:
  publish:
    name: build & push to ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: read version from pyproject.toml
        id: version
        run: |
          set -euo pipefail
          v=$(grep -m1 -E '^version\s*=' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$v" ]; then
            echo "could not read version from pyproject.toml" >&2
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "duitku version: $v"

      - name: lowercase repo owner
        # ghcr.io requires lowercase paths; GitHub usernames may be mixed-case.
        id: repo
        run: |
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner_lc}/duitku" >> "$GITHUB_OUTPUT"

      - name: derive image tags
        id: tags
        run: |
          set -euo pipefail
          image="${{ steps.repo.outputs.image }}"
          version="${{ steps.version.outputs.version }}"
          short_sha="${GITHUB_SHA::7}"

          tags=()
          tags+=("${image}:${version}")
          tags+=("${image}:sha-${short_sha}")

          ref="${GITHUB_REF}"
          if [ "$ref" = "refs/heads/main" ]; then
            tags+=("${image}:main")
            tags+=("${image}:latest")
          elif [[ "$ref" == refs/tags/v* ]]; then
            tag_ver="${ref#refs/tags/}"        # vX.Y.Z
            stripped="${tag_ver#v}"            # X.Y.Z
            major="${stripped%%.*}"
            minor_rest="${stripped#*.}"
            minor="${minor_rest%%.*}"
            tags+=("${image}:${tag_ver}")
            tags+=("${image}:v${major}.${minor}")
            tags+=("${image}:v${major}")
            tags+=("${image}:latest")
            # Sanity check: a vX.Y.Z tag should match the pyproject version.
            if [ "$stripped" != "$version" ]; then
              echo "::warning::git tag $tag_ver does not match pyproject version $version"
            fi
          fi

          # Comma-separated list for docker/build-push-action.
          ( IFS=','; echo "tags=${tags[*]}" ) >> "$GITHUB_OUTPUT"
          printf "tags:\n"
          printf '  %s\n' "${tags[@]}"

      - uses: docker/setup-buildx-action@v3

      - name: login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          # OCI labels make `docker inspect` / GHCR UI traceable to the
          # exact commit + version that produced the image. Required for
          # GHCR's "linked to repository" feature.
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.title=duitku
            org.opencontainers.image.description=Malaysian bank-statement parser and Firefly III importer
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: summary
        run: |
          echo "### Published" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
