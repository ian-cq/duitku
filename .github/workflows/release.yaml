# release.yaml — main orchestrator: validate via build.yaml, then publish to GHCR.
#
# Trigger: push to main only. PRs run build.yaml directly (see that
# file's own triggers); they do not enter this workflow. Tag-based and
# manual (workflow_dispatch) triggers are intentionally removed — the
# only way to publish an image is to land a commit on main.
#
# Job graph:
#
#   build (reusable: ./.github/workflows/build.yaml)
#     │
#     └── publish   (push image to ghcr.io/<owner>/duitku)
#
# Auth is the workflow-issued GITHUB_TOKEN with packages: write — no
# PAT required. The first publish creates the package under the repo;
# visibility (private/public) is then managed via the GitHub UI
# (Settings -> Packages).
#
# The image is amd64-only on purpose: the homelab k3s cluster is a
# single amd64 node and cross-building arm64 doubles CI time for zero
# operational benefit. Add an arm64 build here if/when a second node
# joins.

name: release

on:
  push:
    branches: [main]

# Serialize main-push publishes. Never cancel an in-flight publish —
# half-pushed image tags on GHCR are worse than a queued run.
concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build:
    name: build
    uses: ./.github/workflows/build.yaml
    # build.yaml needs no special permissions; default token is fine.

  publish:
    name: build & push to ghcr.io
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: read version from pyproject.toml
        id: version
        run: |
          set -euo pipefail
          v=$(grep -m1 -E '^version\s*=' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$v" ]; then
            echo "could not read version from pyproject.toml" >&2
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "duitku version: $v"

      - name: lowercase repo owner
        # ghcr.io requires lowercase paths; GitHub usernames may be mixed-case.
        id: repo
        run: |
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner_lc}/duitku" >> "$GITHUB_OUTPUT"

      - name: derive image tags
        id: tags
        run: |
          set -euo pipefail
          image="${{ steps.repo.outputs.image }}"
          version="${{ steps.version.outputs.version }}"
          short_sha="${GITHUB_SHA::7}"

          # Only main-push reaches this job, so the tag set is fixed:
          #   :<pyproject-version>  reproducible pin
          #   :sha-<short>          exact commit
          #   :main                 rolling main branch
          #   :latest               rolling latest
          tags="${image}:${version},${image}:sha-${short_sha},${image}:main,${image}:latest"
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          printf "tags:\n"
          printf '  %s\n' ${tags//,/ }

      - uses: docker/setup-buildx-action@v3

      - name: login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          # OCI labels make `docker inspect` / GHCR UI traceable to the
          # exact commit + version that produced the image. The `source`
          # label is what GHCR uses to auto-link the package to this repo.
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.title=duitku
            org.opencontainers.image.description=Malaysian bank-statement parser and Firefly III importer
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: summary
        run: |
          echo "### Published" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
