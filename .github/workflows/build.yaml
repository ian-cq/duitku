# build.yaml — reusable build + test workflow for duitku.
#
# Called by release.yaml (and any other workflow that wants to
# validate the repo without publishing). Pure validation: pytest +
# a no-push Docker build to catch Dockerfile regressions. No GHCR
# writes, no git tag side-effects.
#
# Kept as a separate file (rather than inlined into release.yaml)
# so that:
#   - the test/docker-build outputs surface as their own checks on
#     the PR status page, distinct from the release publish step;
#   - a future workflow (e.g. a nightly schedule, a manual
#     debug-run, a worker-deploy.yaml) can re-use the same
#     validation entrypoint without copy-paste.

name: build

on:
  workflow_call:
    inputs:
      ref:
        description: "git ref to check out (default: caller's ref)"
        type: string
        required: false
        default: ''

jobs:
  test:
    name: test (python 3.13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: install duitku + dev + parsers extras
        run: |
          python -m pip install --upgrade pip
          # [parsers] is needed because the parser tests import
          # pikepdf/pdfplumber lazily via pdfutil.open_pdf.
          pip install '.[dev,parsers]'

      - name: pytest
        run: pytest -ra

  docker-build:
    name: docker build (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - name: build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          # Cluster is single-node amd64; cross-arch builds are wasted CI time.
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
