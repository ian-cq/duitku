# build.yaml — CI for duitku.
#
# Runs on every push/PR to main and on version tags. The job graph is:
#
#   test            ─┐
#                    ├── release (only on push to main + tag pushes)
#   docker-build    ─┘
#
# - `test` runs pytest on cp3.13 (the deployment target).
# - `docker-build` does a no-push build to catch Dockerfile regressions
#   without burning GHCR pulls.
# - `release` is invoked via `workflow_call` from this file; it lives
#   in release.yaml so it can also be run on its own via
#   workflow_dispatch when a re-publish is needed without a code
#   change. The `permissions:` block here is what grants the called
#   workflow access to GHCR.
#
# We do not publish from PRs (would expose the registry to forks). We
# also do not publish from feature branches; main + tags only.

name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same ref when a new commit lands.
# Workflow runs on tags are kept (release builds shouldn't be cancelled).
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  test:
    name: test (python 3.13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: install duitku + dev + parsers extras
        run: |
          python -m pip install --upgrade pip
          # [parsers] is needed because the parser tests import pikepdf/pdfplumber lazily.
          pip install '.[dev,parsers]'

      - name: pytest
        run: pytest -ra

  docker-build:
    name: docker build (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          # Cluster is single-node amd64; cross-arch builds are wasted CI time.
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: release
    needs: [test, docker-build]
    # Publish on:
    #   - push to main (rolling :main + :latest + :<pyproject-version>)
    #   - tag push v* (semver-tagged release, also :latest)
    # PRs and feature branches build-and-test only.
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    uses: ./.github/workflows/release.yaml
    permissions:
      contents: read
      packages: write
